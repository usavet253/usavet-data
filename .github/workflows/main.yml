name: USAVET Data Repo Maintenance

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  data-repo-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm output-only repo structure
        run: |
          echo "usavet-data is an output-only public repository."
          echo "Engine execution must occur in usavet-engine, not here."
          echo "Current files:"
          ls -la

      - name: Validate expected public files
        run: |
          test -f public_daily.json && echo "public_daily.json present" || (echo "public_daily.json missing" && exit 1)
          test -f history.json && echo "history.json present" || (echo "history.json missing" && exit 1)
          test -f README.md && echo "README.md present" || (echo "README.md missing" && exit 1)

      - name: Validate internal files are absent
        run: |
          test ! -f daily.json && echo "daily.json absent (correct)" || (echo "daily.json present (unexpected)" && exit 1)
          test ! -f usavet_real_data_v1.json && echo "usavet_real_data_v1.json absent (correct)" || (echo "usavet_real_data_v1.json present (unexpected)" && exit 1)

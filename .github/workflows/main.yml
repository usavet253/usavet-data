name: USAVET Daily Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil reportlab pypdf

      - name: Run real data engine
        run: |
          python usavet_real_data_engine_v1.py --output usavet_real_data_v1.json

      - name: Convert engine output to website daily.json
        run: |
          python - <<'PY'
          import json
          from datetime import datetime

          with open("usavet_real_data_v1.json", "r", encoding="utf-8") as f:
              raw = json.load(f)

          now = datetime.now()

          narrative = raw.get("narrative", "System stable")
          if isinstance(narrative, str):
              summary = [narrative]
          elif isinstance(narrative, list):
              summary = narrative
          else:
              summary = ["System stable"]

          scores = raw.get("scores", {})

          daily = {
              "date": now.strftime("%B %d, %Y"),
              "time": now.strftime("%I:%M %p PT"),
              "composite": raw.get("composite_score", 60),
              "status": raw.get("status", "Stable"),
              "domains": {
                  "housing": scores.get("housing_stability", 55),
                  "affordability": scores.get("cost_of_living_pressure", 60),
                  "employment": scores.get("employment_opportunity", 70),
                  "morale": scores.get("veteran_morale_community", 60),
                  "benefits": 50,
                  "media": 46
              },
              "summary": summary,
              "pdf": "#"
          }

          with open("daily.json", "w", encoding="utf-8") as f:
              json.dump(daily, f, indent=2)
          PY

      - name: Commit and push updated daily.json
        run: |
          git config user.name "usavet-bot"
          git config user.email "bot@usavet.ai"
          git add daily.json
          git diff --cached --quiet || git commit -m "Automated daily update"
          git push

name: USAVET Daily Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run real data engine
        run: |
          python usavet_real_data_engine_v1.py

      - name: Convert to website format
        run: |
          python - <<'PY'
          import json
          from datetime import datetime

          with open("usavet_real_data_v1.json", "r", encoding="utf-8") as f:
              raw = json.load(f)

          now = datetime.now()

          narrative = raw.get("narrative", "System stable")
          if isinstance(narrative, str):
              summary = [narrative]
          elif isinstance(narrative, list):
              summary = narrative
          else:
              summary = ["System stable"]

          daily = {
              "date": now.strftime("%B %d, %Y"),
              "time": now.strftime("%I:%M %p PT"),
              "composite": raw.get("composite_score", 60),
              "status": raw.get("status", "Stable"),
              "domains": {
                  "housing": raw.get("scores", {}).get("housing_affordability", 55),
                  "affordability": raw.get("scores", {}).get("cost_of_living", 60),
                  "employment": raw.get("scores", {}).get("employment", 70),
                  "morale": raw.get("scores", {}).get("health_wellbeing", 60),
                  "benefits": raw.get("scores", {}).get("benefits_processing", 50),
                  "media": raw.get("scores", {}).get("media_environment", 46)
              },
              "summary": summary,
              "pdf": "#"
          }

          with open("daily.json", "w", encoding="utf-8") as f:
              json.dump(daily, f, indent=2)
          PY

      - name: Commit and push update
        shell: bash
        run: |
          git config user.name "usavet-bot"
          git config user.email "bot@usavet.ai"

          git add daily.json usavet_real_data_v1.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Automated daily update"

          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

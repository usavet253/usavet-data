name: USAVET Data Repo Maintenance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  data-repo-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm output-only repo structure
        run: |
          echo "usavet-data is an output-only public repository."
          echo "Engine execution must occur in usavet-engine, not here."
          echo "Current files:"
          ls -la

      - name: Validate expected public files
        run: |
          test -f public_daily.json && echo "public_daily.json present" || echo "public_daily.json missing"
          test -f history.json && echo "history.json present" || echo "history.json missing"
          test -f README.md && echo "README.md present" || echo "README.md missing"

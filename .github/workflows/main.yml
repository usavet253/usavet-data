name: USAVET Daily Automation

on:
  schedule:
    - cron: '0 8 * * *'   # Midnight Pacific (UTC 8)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements_usavet_index.txt

      - name: Run real data engine
        run: |
          python usavet_real_data_engine_v1.py

      - name: Convert to website format
        run: |
          python - <<EOF
import json
from datetime import datetime

with open("usavet_real_data_v1.json") as f:
    raw = json.load(f)

now = datetime.now()

daily = {
    "date": now.strftime("%B %d, %Y"),
    "time": now.strftime("%I:%M %p PT"),
    "composite": raw.get("composite_score", 60),
    "status": raw.get("status", "Stable"),
    "domains": {
        "housing": raw["scores"].get("housing_affordability", 55),
        "affordability": raw["scores"].get("cost_of_living", 60),
        "employment": raw["scores"].get("employment", 70),
        "morale": raw["scores"].get("health_wellbeing", 60),
        "benefits": raw["scores"].get("benefits_processing", 50),
        "media": 46
    },
    "summary": raw.get("narrative", ["System stable"]),
    "pdf": "#"
}

with open("daily.json", "w") as f:
    json.dump(daily, f, indent=2)
EOF

      - name: Commit update
        run: |
          git config user.name "usavet-bot"
          git config user.email "bot@usavet.ai"
          git add daily.json
          git commit -m "Automated daily update" || echo "No changes"
          git push

name: USAVET Daily Automation

on:
  schedule:
    - cron: "15 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-usavet-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: python usavet_real_data_engine_v1.py

      - name: Show generated files
        run: |
          ls -la
          echo "---- usavet_real_data_v1.json ----"
          head -100 usavet_real_data_v1.json || true
          echo "---- history.json ----"
          head -40 history.json || true

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add usavet_real_data_v1.json history.json
          git diff --cached --quiet || git commit -m "Automated daily USAVET update"
          git push

      - name: Convert to website format
        run: |
          python - <<'PY'
          import json
          from datetime import datetime

          with open("usavet_real_data_v1.json", "r") as f:
              raw = json.load(f)

          now = datetime.now()

          daily = {
              "date": now.strftime("%B %d, %Y"),
              "time": now.strftime("%I:%M %p PT"),
              "composite": raw.get("composite_score", 60),
              "status": raw.get("status", "Stable"),
              "domains": {
                  "housing": raw.get("scores", {}).get("housing_affordability", 55),
                  "affordability": raw.get("scores", {}).get("cost_of_living", 60),
                  "employment": raw.get("scores", {}).get("employment", 70),
                  "morale": raw.get("scores", {}).get("health_wellbeing", 60),
                  "benefits": raw.get("scores", {}).get("benefits_processing", 50),
                  "media": 46
              },
              "summary": raw.get("narrative", ["System stable"]),
              "pdf": "#"
          }

          with open("daily.json", "w") as f:
              json.dump(daily, f, indent=2)
          PY

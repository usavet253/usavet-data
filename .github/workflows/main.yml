name: USAVET Daily Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run real data engine
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python usavet_real_data_engine_v1.py

      - name: Convert to website format
        run: |
          python - <<'PY'
          import json
          from datetime import datetime

          with open("usavet_real_data_v1.json", "r", encoding="utf-8") as f:
              raw = json.load(f)

          now = datetime.now()
          trends = raw.get("display_trends", {})

          daily = {
              "date": now.strftime("%B %d, %Y"),
              "time": now.strftime("%I:%M %p PT"),
              "composite": raw.get("composite_score", 60),
              "status": raw.get("status", "Stable"),
              "domains": {
                  "housing": raw.get("scores", {}).get("housing", 55),
                  "affordability": raw.get("scores", {}).get("cost_of_living", 60),
                  "employment": raw.get("scores", {}).get("employment", 70),
                  "morale": raw.get("scores", {}).get("morale", 58),
                  "benefits": raw.get("scores", {}).get("benefits", 50),
                  "media": raw.get("scores", {}).get("media", 45)
              },
              "summary": raw.get("summary", raw.get("narrative", ["System stable"])),
              "trend": {
                  "composite": trends.get("composite", {}),
                  "housing": trends.get("housing", {}),
                  "affordability": trends.get("cost_of_living", {}),
                  "employment": trends.get("employment", {}),
                  "morale": trends.get("morale", {}),
                  "benefits": trends.get("benefits", {}),
                  "media": trends.get("media", {})
              }
          }

          with open("daily.json", "w", encoding="utf-8") as f:
              json.dump(daily, f, indent=2)

          print("Wrote daily.json")
          PY

      - name: Commit and push update
        run: |
          git config user.name "usavet-bot"
          git config user.email "actions@github.com"
          git add daily.json usavet_real_data_v1.json history.json
          git diff --staged --quiet || git commit -m "Automated daily update"
          git push
